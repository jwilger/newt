name: Elixir CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Set up Elixir
        uses: erlef/setup-beam@v1.18.1
        with:
          elixir-version: "1.17" # [Required] Define the Elixir version
          otp-version: "27" # [Required] Define the Erlang/OTP version
      - name: Restore dependencies cache
        uses: actions/cache@v3
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-
      - name: Restore _build cache
        uses: actions/cache@v3
        with:
          path: _build
          key: ${{ runner.os }}-build-${{ hashFiles('**/*.ex') }}
          restore-keys: ${{ runner.os }}-build-
      - name: Install dependencies
        run: mix deps.get
      - name: Run Quality Checks
        run: mix check

  semantic-review:
    name: Request auto_review semantic review
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      AUTO_REVIEW_GATEWAY_URL: ${{ vars.AUTO_REVIEW_GATEWAY_URL }}
      AR_CI_REVIEW_TOKEN: ${{ secrets.AR_CI_REVIEW_TOKEN }}
    steps:
      - name: Skip when auto_review configuration is not available
        if: ${{ env.AUTO_REVIEW_GATEWAY_URL == '' || env.AR_CI_REVIEW_TOKEN == '' || env.AUTO_REVIEW_GATEWAY_URL == github.server_url }}
        run: |
          echo "auto_review semantic review skipped: repository variable AUTO_REVIEW_GATEWAY_URL must point at ar-gateway, secret AR_CI_REVIEW_TOKEN must match the gateway AR_CI_REVIEW_TOKEN, and the gateway URL must not be the Forgejo server URL"

      - name: Request auto_review review
        continue-on-error: true
        if: ${{ env.AUTO_REVIEW_GATEWAY_URL != '' && env.AR_CI_REVIEW_TOKEN != '' && env.AUTO_REVIEW_GATEWAY_URL != github.server_url }}
        run: |
          set -euo pipefail
          json_payload='{"owner":"${{ github.repository_owner }}","repo":"${{ github.event.repository.name }}","pr_number":${{ github.event.pull_request.number }},"head_sha":"${{ github.event.pull_request.head.sha }}"}'
          response_file="$(mktemp)"
          status="$(curl -sS --connect-timeout 5 --max-time 30 -o "$response_file" -w '%{http_code}' -X POST \
            -H "Authorization: Bearer $AR_CI_REVIEW_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$json_payload" \
            "${AUTO_REVIEW_GATEWAY_URL%/}/reviews/ci")"

          if [ "$status" -eq 401 ] || [ "$status" -eq 403 ]; then
            echo "auto_review semantic review authorization failed with HTTP $status; verify the AR_CI_REVIEW_TOKEN secret matches production AR_CI_REVIEW_TOKEN" >&2
            exit 1
          fi

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "auto_review semantic review request failed with HTTP $status" >&2
            cat "$response_file" >&2
            exit 1
          fi

          echo "auto_review semantic review requested"
