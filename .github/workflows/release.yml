name: Publish Package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Publish to Hex
    runs-on: [self-hosted, self-hosted-gregor]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Elixir
        uses: erlef/setup-beam@v1.18.1
        with:
          elixir-version: "1.20"
          otp-version: "29"
      - name: Compute mix.lock hash
        id: mixlockhash
        # gregor's runner is missing the node20 helper hashFiles() needs; compute by hand.
        run: |
          shopt -s globstar
          echo "hash=$(cat **/mix.lock | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ steps.mixlockhash.outputs.hash }}
          restore-keys: ${{ runner.os }}-mix-
      - name: Compute ex files hash
        id: exfileshash
        # gregor's runner is missing the node20 helper hashFiles() needs; compute by hand.
        run: |
          shopt -s globstar
          echo "hash=$(cat **/*.ex | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
      - name: Restore _build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: ${{ runner.os }}-build-${{ steps.exfileshash.outputs.hash }}
          restore-keys: ${{ runner.os }}-build-
      - name: Install dependencies
        run: mix deps.get
      - name: Check version
        run: |
          MIX_VERSION=$(grep 'version:' mix.exs | cut -d '"' -f2)
          TAG_VERSION=${GITHUB_REF/refs\/tags\/v/}
          if [ "$MIX_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match mix.exs version ($MIX_VERSION)"
            exit 1
          fi
      - name: Publish to Hex
        uses: synchronal/hex-publish-action@v3
        with:
          name: newt
          key: ${{ secrets.HEX_API_KEY }}
          tag-release: false
