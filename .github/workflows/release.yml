name: Publish Package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Publish to Hex
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Elixir
        uses: erlef/setup-beam@v1.18.1
        with:
          elixir-version: "1.20"
          otp-version: "29"
      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-
      - name: Restore _build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: ${{ runner.os }}-build-${{ hashFiles('**/*.ex') }}
          restore-keys: ${{ runner.os }}-build-
      - name: Install dependencies
        run: mix deps.get
      - name: Check version
        run: |
          MIX_VERSION=$(grep 'version:' mix.exs | cut -d '"' -f2)
          TAG_VERSION=${GITHUB_REF/refs\/tags\/v/}
          if [ "$MIX_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match mix.exs version ($MIX_VERSION)"
            exit 1
          fi
      - name: Load publish secrets
        id: load_secrets
        uses: 1password/load-secrets-action@v4
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          HEX_API_KEY: op://Github Secrets/HEX_API_KEY/credential
      - name: Publish to Hex
        uses: synchronal/hex-publish-action@v3
        with:
          name: newt
          key: ${{ steps.load_secrets.outputs.HEX_API_KEY }}
          tag-release: false
